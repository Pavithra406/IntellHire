services:
  - type: web
    name: intellhire-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: intellhire-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 60
      - key: GEMINI_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://intellhire-frontend.onrender.com,http://localhost:5173
      - key: UPLOAD_DIR
        value: uploads
      - key: CHROMA_PERSIST_DIR
        value: ./chroma_data
      - key: DEBUG
        value: false

databases:
  - name: intellhire-db
    databaseName: ai_hiring_db
    user: intellhire
