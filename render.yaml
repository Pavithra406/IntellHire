services:
  # Backend API
  - type: web
    name: intellhire-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: intellhire-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: GEMINI_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: UPLOAD_DIR
        value: uploads
      - key: CHROMA_PERSIST_DIR
        value: ./chroma_data
      - key: DEBUG
        value: "false"
      - key: APP_NAME
        value: AI Interview Hiring Agent

  # Frontend
  - type: web
    name: intellhire-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: intellhire-db
    databaseName: ai_hiring_db
    user: intellhire_user
    plan: free
